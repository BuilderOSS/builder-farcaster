<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Builder Farcaster Bot</title>
    <style>
      :root {
        --bg: #0b1020;
        --panel: #121a30;
        --text: #e8eefc;
        --muted: #9fb0d8;
        --accent: #4db6ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family:
          ui-sans-serif,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        background: radial-gradient(
          circle at 20% 10%,
          #1d2b52 0%,
          var(--bg) 55%
        );
        color: var(--text);
      }

      main {
        width: min(720px, calc(100% - 2rem));
        padding: 1.5rem;
        border-radius: 16px;
        background: linear-gradient(180deg, #1a2545 0%, var(--panel) 100%);
        border: 1px solid #2a3763;
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.4rem;
        letter-spacing: 0.01em;
      }

      p {
        margin: 0.25rem 0;
        color: var(--muted);
        line-height: 1.45;
      }

      code {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Builder Farcaster Bot is running</h1>
      <p>This service powers scheduled proposal and propdate notifications.</p>
      <p>Runtime health endpoint: <code>/api/health</code></p>
    </main>
  </body>
</html>
